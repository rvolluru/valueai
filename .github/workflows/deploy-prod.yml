name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: valueai-mvp-api
      TF_DIR: infra/terraform
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image (with Clerk build arg)
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: prod-${{ github.run_number }}-${{ github.sha }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          test -n "${VITE_CLERK_PUBLISHABLE_KEY}"
          case "${VITE_CLERK_PUBLISHABLE_KEY}" in
            pk_*) ;;
            *) echo "VITE_CLERK_PUBLISHABLE_KEY is missing/invalid (must start with pk_)" >&2; exit 1 ;;
          esac
          echo "clerk_key_present=yes"
          echo "clerk_key_len=${#VITE_CLERK_PUBLISHABLE_KEY}"
          echo "clerk_key_prefix=${VITE_CLERK_PUBLISHABLE_KEY:0:3}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            --no-cache \
            -f apps/api/Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY}" \
            -t "${IMAGE_URI}" \
            .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Write production tfvars from secret
        working-directory: ${{ env.TF_DIR }}
        env:
          TFVARS_PROD_B64: ${{ secrets.TFVARS_PROD_B64 }}
        run: |
          set -euo pipefail
          test -n "${TFVARS_PROD_B64}"
          echo "${TFVARS_PROD_B64}" | base64 --decode > terraform.tfvars
          # CI uses aws-actions credentials, not local AWS profiles.
          # Force local-only vars to null to avoid provider profile lookup errors.
          if grep -qE '^[[:space:]]*aws_profile[[:space:]]*=' terraform.tfvars; then
            sed -i.bak -E 's#^[[:space:]]*aws_profile[[:space:]]*=.*#aws_profile                       = null#' terraform.tfvars
          else
            echo 'aws_profile                       = null' >> terraform.tfvars
          fi
          if grep -qE '^[[:space:]]*aws_assume_role_arn[[:space:]]*=' terraform.tfvars; then
            sed -i.bak -E 's#^[[:space:]]*aws_assume_role_arn[[:space:]]*=.*#aws_assume_role_arn               = null#' terraform.tfvars
          fi

      - name: Write terraform backend config from secret
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_BACKEND_CONFIG_B64: ${{ secrets.TF_BACKEND_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "${TF_BACKEND_CONFIG_B64}"
          echo "${TF_BACKEND_CONFIG_B64}" | base64 --decode > backend.hcl

      - name: Terraform apply (new image)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          terraform init -input=false -backend-config=backend.hcl
          terraform apply -auto-approve -input=false -var "container_image=${{ steps.image.outputs.image_uri }}"
